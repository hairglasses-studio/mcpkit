# Round-robin load balancer for MCP server instances.
# Nginx distributes requests evenly across both backends.
# Because sessions live in Redis, any backend can handle any request.

upstream mcp_backends {
    server mcp-server-1:8080;
    server mcp-server-2:8080;
}

server {
    listen 80;

    location / {
        proxy_pass http://mcp_backends;

        # Pass through session headers so the session extractor can find them.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Session-ID $http_x_session_id;

        # SSE support for MCP streaming.
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;

        # Timeouts for long-running MCP tool calls.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Health check endpoint for external monitoring.
    location /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
