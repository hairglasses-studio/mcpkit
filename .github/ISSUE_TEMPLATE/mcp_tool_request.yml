name: MCP Tool Request
description: Propose a new MCP tool for a server built with mcpkit
title: "[Tool] "
labels: ["type/mcp-tool", "status/triage"]
assignees: ["hairglasses"]
body:
  - type: markdown
    attributes:
      value: |
        Propose a new MCP tool! Describe what it should do, who benefits, and how agents would use it.

  - type: input
    id: tool-name
    attributes:
      label: Tool Name
      description: "Follow the `module_action` naming convention (e.g., `process_kill`, `shader_apply`)"
      placeholder: "system_disk_usage"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What does this tool do? One clear sentence.
      placeholder: "Reports disk usage statistics for specified mount points."
    validations:
      required: true

  - type: textarea
    id: parameters
    attributes:
      label: Input Parameters
      description: What input parameters should the tool accept? Use a table format.
      placeholder: |
        | Parameter | Type | Required | Description |
        |-----------|------|----------|-------------|
        | path | string | no | Mount point to check (default: all) |
        | format | string | no | Output format: "summary" or "detailed" |
    validations:
      required: true

  - type: textarea
    id: output
    attributes:
      label: Expected Output
      description: What should the tool return? Provide an example.
      placeholder: |
        ```json
        {
          "mounts": [
            {"path": "/", "total_gb": 500, "used_gb": 234, "percent": 46.8},
            {"path": "/home", "total_gb": 1000, "used_gb": 678, "percent": 67.8}
          ]
        }
        ```
    validations:
      required: true

  - type: dropdown
    id: target-server
    attributes:
      label: Target Server
      description: Which MCP server should this tool be added to?
      options:
        - systemd-mcp
        - tmux-mcp
        - process-mcp
        - dotfiles-mcp
        - mcpkit (core / example server)
        - other (specify in description)
    validations:
      required: true

  - type: textarea
    id: security
    attributes:
      label: Security Considerations
      description: Does this tool read sensitive data, modify system state, or require elevated privileges?
      placeholder: "Read-only, no sensitive data. Only reads /proc/mounts and statvfs."

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I checked the existing tool catalog and this is not a duplicate
          required: true
        - label: I am willing to implement this tool
          required: false
