name: Codex PR Risk Summary

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number to summarize"
        required: true
        type: string
      focus:
        description: "Optional extra focus area"
        required: false
        default: "Framework regressions, contract drift, and missing tests"
        type: string

jobs:
  codex-pr-risk-summary:
    uses: hairglasses-studio/.github/.github/workflows/codex-pr-risk-summary.yml@main
    with:
      pr_number: ${{ github.event.inputs.pr_number }}
      focus: ${{ github.event.inputs.focus }}
    secrets: inherit
