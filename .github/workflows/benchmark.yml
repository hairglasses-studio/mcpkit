name: Benchmark

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run benchmarks
        run: go test -bench=. -benchmem -count=5 -timeout=10m ./... 2>&1 | tee bench-current.txt

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest

      - name: Download baseline
        if: github.event_name == 'pull_request'
        uses: actions/cache/restore@v4
        with:
          path: bench-baseline.txt
          key: benchmark-${{ github.base_ref }}

      - name: Compare with baseline
        if: github.event_name == 'pull_request' && hashFiles('bench-baseline.txt') != ''
        run: |
          benchstat bench-baseline.txt bench-current.txt | tee benchstat-diff.txt
          echo "## Benchmark Comparison" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat benchstat-diff.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Save baseline
        if: github.ref == 'refs/heads/main'
        uses: actions/cache/save@v4
        with:
          path: bench-current.txt
          key: benchmark-main-${{ github.sha }}

      - name: Save baseline as latest
        if: github.ref == 'refs/heads/main'
        uses: actions/cache/save@v4
        with:
          path: bench-current.txt
          key: benchmark-main
